# Set everything to be logged to the consolelog4j.rootCategory=WARN, console# console handlerlog4j.appender.console=org.apache.log4j.ConsoleAppenderlog4j.appender.console.target=System.outlog4j.appender.console.layout=org.apache.log4j.PatternLayoutlog4j.appender.console.layout.ConversionPattern=%d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n# file handler#log4j.appender.file=org.apache.log4j.FileAppender#log4j.appender.file.File=/home/21540888_omega-sbrf-ru/dev/bki/spark.log#log4j.appender.file.layout=org.apache.log4j.PatternLayout#log4j.appender.file.layout.ConversionPattern=%d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%nlog4j.logger.org.apache.parquet=ERRORlog4j.logger.parquet=ERROR# Set the log level to WARN for everythinglog4j.logger.org.apache=WARNlog4j.logger.com.hortonworks.spark.atlas=WARN